# ==========================================================================
# ACEest Fitness & Gym – CI/CD Pipeline (GitHub Actions)
# ==========================================================================
# Triggered on every push or pull_request to the main branch.
# Stages:
#   1. Lint       – flake8 static analysis
#   2. Test       – pytest unit & integration tests
#   3. Docker     – Build the Docker image (validates Dockerfile)
# ==========================================================================

name: ACEest CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---- Stage 1: Lint & Syntax Check --------------------------------------
  lint:
    name: "🔍 Lint & Syntax Check"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run flake8 linter
        run: |
          flake8 app.py test_app.py --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 app.py test_app.py --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

  # ---- Stage 2: Automated Testing ----------------------------------------
  test:
    name: "🧪 Run Pytest Suite"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with pytest
        run: |
          pytest test_app.py -v --tb=short

  # ---- Stage 3: Docker Image Build ---------------------------------------
  docker:
    name: "🐳 Build Docker Image"
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t aceest-fitness-gym:latest .

      - name: Verify container starts
        run: |
          docker run -d --name aceest-test -p 5000:5000 aceest-fitness-gym:latest
          sleep 5
          curl --fail http://localhost:5000/ || exit 1
          docker stop aceest-test
          docker rm aceest-test
